<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bellGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="40%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1E3A8A" />
    </linearGradient>

    <linearGradient id="triGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" />
      <stop offset="100%" stop-color="#C084FC" />
    </linearGradient>

    <linearGradient id="tentacleGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>

    <linearGradient id="tentacleGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="50%" stop-color="#60A5FA" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.45" />
    </filter>
    
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <rect x="20" y="20" width="760" height="760" rx="120" fill="#0D121F" />

  <path d="M 230,730 L 100,730 A 40,40 0 0,1 60,690 L 60,110 A 40,40 0 0,1 100,70 L 700,70 A 40,40 0 0,1 740,110 L 740,690 A 40,40 0 0,1 700,730 L 570,730" 
        stroke="#303E5C" fill="none" stroke-width="8" stroke-linecap="round" />

  <g stroke="#6EE7B7" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="110,130 145,165 110,200" />
    <line x1="165" y1="200" x2="220" y2="200" />
  </g>

  <g filter="url(#glow)">
    
    <g stroke-width="18" stroke-linecap="round" fill="none">
      <path d="M 260 370 C 230 450, 290 500, 240 570" stroke="url(#tentacleGrad1)" />
      <path d="M 305 375 C 275 470, 345 520, 295 600" stroke="url(#tentacleGrad2)" />
      <path d="M 350 375 C 320 490, 390 540, 340 630" stroke="url(#tentacleGrad1)" />
      
      <path d="M 400 380 C 370 490, 440 550, 395 650" stroke="url(#tentacleGrad2)" />
      
      <path d="M 450 375 C 480 490, 410 540, 460 630" stroke="url(#tentacleGrad1)" />
      <path d="M 495 375 C 525 470, 455 520, 505 600" stroke="url(#tentacleGrad2)" />
      <path d="M 540 370 C 570 450, 510 500, 560 570" stroke="url(#tentacleGrad1)" />
    </g>

    <path d="M 210 370 C 210 160, 590 160, 590 370 Q 542 395, 495 370 Q 447 345, 400 375 Q 352 345, 305 370 Q 257 395, 210 370 Z" 
          fill="url(#bellGrad)" />
          
    <path d="M 240 310 C 270 210, 530 210, 560 310" stroke="#7DD3FC" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.3" />

    <polygon points="400,210 470,320 330,320" 
             stroke="url(#triGrad)" stroke-width="26" stroke-linejoin="round" fill="none" />
  </g>

  <text x="400" y="650" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="115" 
        font-weight="800" 
        letter-spacing="2"
        text-anchor="middle" 
        fill="url(#textGrad)"
        filter="url(#textGlow)">
    aquafin
  </text>

  <text x="400" y="742" 
        font-family="monospace, Courier, 'Courier New'" 
        font-size="34" 
        font-weight="600" 
        letter-spacing="0"
        text-anchor="middle" 
        fill="#556582">
    jellyfin tui client
  </text>
</svg>
