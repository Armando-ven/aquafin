  <g fill="none" stroke-width="12" stroke-linecap="round">
    <path d="M 160 210 C 160 240, 130 250, 130 280 C 130 310, 150 320, 140 350" stroke="url(#tentacleBlue)" />
    <path d="M 185 210 C 185 250, 155 260, 155 300 C 155 340, 185 350, 165 380" stroke="url(#tentaclePurple)" />
    <path d="M 215 210 C 215 260, 185 280, 185 320 C 185 360, 215 370, 195 400" stroke="url(#tentacleBlue)" />
    <path d="M 256 210 C 256 270, 226 290, 226 330 C 226 370, 266 380, 246 410" stroke="url(#tentaclePurple)" stroke-width="14" />
    <path d="M 297 210 C 297 260, 327 280, 327 320 C 327 360, 297 370, 317 400" stroke="url(#tentacleBlue)" />
