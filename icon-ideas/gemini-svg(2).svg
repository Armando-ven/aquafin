  <path d="M256 115 L 205 195 C 200 203 205 212 215 212 L 297 212 C 307 212 312 203 307 195 Z" fill="none" stroke="url(#playBtn)" stroke-width="18" stroke-linejoin="round" />

  <text x="256" y="415" font-family="'Courier New', Consolas, monospace" font-size="72" font-weight="900" fill="url(#textGrad)" text-anchor="middle" letter-spacing="4">aquafin</text>
  
  <line x1="120" y1="465" x2="160" y2="465" stroke="#485b85" stroke-width="4" stroke-linecap="round" />
  <text x="256" y="473" font-family="'Courier New', Consolas, monospace" font-size="22" font-weight="bold" fill="#485b85" text-anchor="middle" letter-spacing="2">jellyfin tui client</text>
  <line x1="352" y1="465" x2="392" y2="465" stroke="#485b85" stroke-width="4" stroke-linecap="round" />
