<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12182c" />
      <stop offset="100%" stop-color="#070a14" />
    </linearGradient>
    
    <linearGradient id="jellyCap" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#15b5e3" />
      <stop offset="100%" stop-color="#1e55d6" />
    </linearGradient>
    
    <linearGradient id="playBtn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b872f2" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#30dfdb" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#a469e3" />
    </linearGradient>

    <linearGradient id="tentacleBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e55d6" />
      <stop offset="100%" stop-color="#30dfdb" />
