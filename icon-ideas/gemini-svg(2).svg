      <stop offset="100%" stop-color="#a469e3" />
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-opacity="0.4" flood-color="#000" />
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="80" fill="url(#bgBox)" />
  
  <rect x="48" y="48" width="416" height="416" rx="60" fill="none" stroke="#2e3b5e" stroke-width="6" />

